<script>
    var pushLink ="https://api.day.app/WJuMbq4XeNYVeawyRdzdeM/";
    var siteName = "Kecho's Blog";
    var valineButton=document.getElementsByClassName("vsubmit vbtn")[0];
    var title = siteName + "上又有新评论啦~!";
  
    function send_valine() {
        //获取元素信息
        var pagename = document.title.match(/(.*)( \| Kecho's Blog)/)[1];
        var vnick = document.getElementsByClassName("vnick vinput")[0].value;
        var status = document.getElementsByClassName("vcol vcol-60 status-bar")[0].innerText;
        var veditor = document.getElementsByClassName("veditor vinput")[0].value;
        if(veditor !== "" && !status.includes("操作频繁") && vnick !== "kecho"){
            var body ="【" + vnick + "】在文章【"+ pagename +"】中说到：\n\n" + veditor;
            var httpRequest = new XMLHttpRequest();
            httpRequest.open("GET",pushLink + title + "/" + encodeURIComponent(body),true);
            httpRequest.send();
        }
    }
  
    document.body.addEventListener('click', function(e) {
        if(e.target.className.indexOf('vsubmit') === -1) {
            return;
        }
        send_valine();
  })
  </script>
